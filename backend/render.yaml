services:
  - type: web
    name: mirror-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: mirror
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: CORS_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
