<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary": "#2900a0",
              "error-container": "#93000a",
              "inverse-surface": "#e2e0fc",
              "on-tertiary-container": "#fff6ef",
              "surface": "#111125",
              "surface-container-low": "#1a1a2e",
              "on-error": "#690005",
              "surface-container-highest": "#333348",
              "tertiary-fixed-dim": "#edbf7c",
              "on-secondary-container": "#b8b6d0",
              "surface-container": "#1e1e32",
              "tertiary": "#edbf7c",
              "on-tertiary-fixed-variant": "#604108",
              "on-primary-fixed": "#160066",
              "tertiary-container": "#906b31",
              "secondary-container": "#47475d",
              "background": "#111125",
              "on-background": "#e2e0fc",
              "error": "#ffb4ab",
              "on-tertiary": "#442c00",
              "on-error-container": "#ffdad6",
              "surface-container-high": "#28283d",
              "on-primary-container": "#faf6ff",
              "secondary-fixed": "#e2e0fc",
              "on-primary-fixed-variant": "#4029ba",
              "outline-variant": "#474554",
              "inverse-on-surface": "#2f2e43",
              "on-secondary-fixed-variant": "#45455b",
              "surface-bright": "#37374d",
              "on-tertiary-fixed": "#281800",
              "primary": "#c6bfff",
              "secondary": "#c6c4df",
              "inverse-primary": "#5847d2",
              "surface-tint": "#c6bfff",
              "secondary-fixed-dim": "#c6c4df",
              "outline": "#928ea0",
              "tertiary-fixed": "#ffddb0",
              "on-secondary-fixed": "#1a1a2e",
              "primary-container": "#6c5ce7",
              "surface-container-lowest": "#0c0c1f",
              "primary-fixed": "#e4dfff",
              "surface-dim": "#111125",
              "primary-fixed-dim": "#c6bfff",
              "on-secondary": "#2f2e43",
              "surface-variant": "#333348",
              "on-surface": "#e2e0fc",
              "on-surface-variant": "#c8c4d7"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #111125;
        }
        .chat-gradient {
            background: linear-gradient(180deg, #111125 0%, #1a1a2e 50%, #291b52 100%);
        }
        .ember-glow {
            box-shadow: 0 0 20px 2px rgba(237, 191, 124, 0.15);
        }
    </style>
</head>
<body class="text-on-surface selection:bg-tertiary/30 selection:text-tertiary-fixed h-screen overflow-hidden">
<!-- SideNavBar (JSON Component) -->
<aside class="fixed left-0 top-0 h-full z-40 h-full w-20 flex flex-col items-center py-8 border-r-0 bg-[#111125] dark:bg-slate-950 bg-gradient-to-r from-slate-900/50 to-transparent flat no shadows">
<div class="mb-12">
<span class="material-symbols-outlined text-3xl text-indigo-100 tracking-tighter" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<nav class="flex flex-col gap-8 flex-1">
<!-- Active: Chat -->
<button class="flex items-center justify-center bg-[#6c5ce7]/20 text-[#edbf7c] rounded-full w-12 h-12 transition-all hover:scale-110 duration-300">
<span class="material-symbols-outlined" data-icon="chat_bubble" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
</button>
<button class="flex items-center justify-center text-slate-500 w-12 h-12 hover:text-indigo-200 hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined" data-icon="book_5">book_5</span>
</button>
<button class="flex items-center justify-center text-slate-500 w-12 h-12 hover:text-indigo-200 hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
</button>
<button class="flex items-center justify-center text-slate-500 w-12 h-12 hover:text-indigo-200 hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</nav>
<div class="mt-auto">
<img alt="Mirror AI Presence" class="w-10 h-10 rounded-full ring-2 ring-tertiary/20" data-alt="Abstract soft glowing orb profile icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA8NN8u5kTdYh6X1hV5RsSMaW7PoLC6WXjM4mbmi2KOoeqqmy98HqwjUQJpyyqc627qJL3E7jI8hESpnfIu2mbVp0I-pzNY1ZiJWktwc6XWmjUPvjVRCLg1BFWY5BnVEeRDFtvnoeF4BRmQv1a69tpEkxKnJkmhryc-rfuH--Uxxc4R7AFpLYPbMWe25X-wgwMtYL4mLIBW7Ve1rqVL_vQPz0j3PHWRkpd4D74Dm8bxFUFed96_EqvPvzJoCt4q2PyVjSDxHVZZrCE"/>
</div>
</aside>
<!-- TopAppBar (JSON Component) -->
<header class="fixed top-0 right-0 w-[calc(100%-5rem)] z-50 h-16 flex justify-between items-center px-8 bg-[#111125]/70 backdrop-blur-xl no borders tonal transition shadow-xl shadow-indigo-950/20">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-tertiary" data-icon="flare">flare</span>
<span class="text-2xl font-bold bg-gradient-to-br from-indigo-300 to-indigo-500 bg-clip-text text-transparent tracking-tighter">Mirror</span>
</div>
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 bg-surface-container-low px-4 py-1.5 rounded-full border border-outline-variant/10">
<span class="w-2 h-2 rounded-full bg-tertiary ember-glow animate-pulse"></span>
<span class="text-sm font-medium text-on-surface-variant font-label">Calm</span>
</div>
<button class="text-[#edbf7c] hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="fiber_manual_record" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
</button>
</div>
</header>
<!-- Main Chat Canvas -->
<main class="ml-20 pt-16 h-full flex flex-col chat-gradient">
<!-- Chat Area -->
<section class="flex-1 overflow-y-auto px-6 md:px-24 py-12 flex flex-col gap-8">
<!-- Bot Message -->
<div class="flex flex-col items-start gap-2 max-w-[80%]">
<div class="flex items-center gap-2 mb-1 px-2">
<span class="text-xs font-semibold text-tertiary/70 uppercase tracking-widest font-label">Mirror</span>
</div>
<div class="bg-surface-container-low/70 backdrop-blur-md p-6 rounded-xl rounded-tl-none border border-outline-variant/5 text-on-surface shadow-sm">
<p class="text-lg leading-relaxed font-body">How are you feeling today? I'm here to listen.</p>
</div>
<!-- Typing Indicator -->
<div class="flex gap-1.5 mt-2 px-4 py-2 bg-surface-container-highest/30 rounded-full w-fit">
<div class="w-1.5 h-1.5 bg-tertiary/60 rounded-full animate-bounce"></div>
<div class="w-1.5 h-1.5 bg-tertiary/60 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
<div class="w-1.5 h-1.5 bg-tertiary/60 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
</div>
</div>
<!-- User Message -->
<div class="flex flex-col items-end gap-2 max-w-[80%] self-end">
<div class="bg-primary-container p-6 rounded-xl rounded-tr-none text-on-primary-container shadow-lg shadow-primary-container/20">
<p class="text-lg leading-relaxed font-body">I've been feeling a bit overwhelmed lately, but talking helps.</p>
</div>
<div class="px-2">
<span class="text-[10px] text-on-surface-variant/50 font-label">Read 2:41 PM</span>
</div>
</div>
</section>
<!-- Input Area -->
<footer class="px-6 md:px-24 pb-12 pt-4 bg-gradient-to-t from-surface to-transparent">
<div class="relative group">
<div class="absolute inset-0 bg-tertiary/5 blur-xl rounded-full opacity-0 group-focus-within:opacity-100 transition-opacity duration-500"></div>
<div class="relative flex items-center bg-surface-container-low border-2 border-tertiary/20 focus-within:border-tertiary/50 transition-all duration-300 rounded-full px-6 py-4 shadow-2xl">
<button class="text-on-surface-variant hover:text-tertiary transition-colors">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
</button>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-outline/50 px-4 font-body text-lg" placeholder="Share your thoughts..." type="text"/>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:text-tertiary transition-colors">
<span class="material-symbols-outlined" data-icon="mic">mic</span>
</button>
<button class="bg-tertiary text-on-tertiary w-12 h-12 rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-lg shadow-tertiary/20">
<span class="material-symbols-outlined" data-icon="send" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
</div>
<p class="text-center mt-6 text-[11px] text-on-surface-variant/40 font-label tracking-wide">
                YOUR PRIVATE SANCTUARY • END-TO-END ENCRYPTED
            </p>
</footer>
</main>
<!-- Background Decorative Elements -->
<div class="fixed top-[-10%] right-[-5%] w-[40rem] h-[40rem] bg-primary-container/5 rounded-full blur-[120px] pointer-events-none z-0"></div>
<div class="fixed bottom-[-10%] left-[10%] w-[30rem] h-[30rem] bg-tertiary/5 rounded-full blur-[100px] pointer-events-none z-0"></div>
</body></html>
